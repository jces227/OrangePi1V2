# DNS and DHCP for lan0
interface=lan0          # Listen only on lan0
bind-interfaces         # Bind to the interface to avoid conflicts
domain-needed           # Don't forward plain names
bogus-priv              # Don't forward private addresses
dhcp-range=10.0.0.100,10.0.0.200,12h   # DHCP IP range and lease time
dhcp-option=3,10.0.0.1  # Gateway
dhcp-option=6,8.8.8.8,8.8.4.4  # DNS servers